version: '3.8'

services:
  user-db:
    image: postgres:16
    container_name: user-db
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: useruser
      POSTGRES_PASSWORD: userpass
    ports:
      - "5433:5432"
    volumes:
      - userdb_data:/var/lib/postgresql/data

  task-db:
    image: postgres:16
    container_name: task-db
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
    ports:
      - "5434:5432"
    volumes:
      - taskdb_data:/var/lib/postgresql/data

volumes:
  userdb_data:
  taskdb_data: